<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" width="100%" height="100%">
  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#14141f"/>
    </linearGradient>
    <linearGradient id="piGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#7f00ff"/>
      <stop offset="100%" stop-color="#e100ff"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7f00ff"/>
      <stop offset="100%" stop-color="#e100ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="350" rx="16" fill="url(#bgGrad)"/>
  <rect width="800" height="350" rx="16" fill="none" stroke="#222233" stroke-width="1.5"/>

  <!-- Graphic Group (Interconnected Pi symbol as connected workflow nodes) -->
  <g transform="translate(100, 50)">
    <!-- Grid/Tech Accents -->
    <circle cx="150" cy="125" r="140" fill="none" stroke="#222233" stroke-width="1" stroke-dasharray="4 8" opacity="0.5"/>
    <circle cx="150" cy="125" r="90" fill="none" stroke="#2c2c3e" stroke-width="0.8" opacity="0.3"/>

    <!-- Connecting lines (Flow paths) -->
    <!-- Top bar path -->
    <path d="M 50,60 C 100,44 200,44 250,60" fill="none" stroke="url(#piGrad)" stroke-width="6.5" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Left Leg -->
    <path d="M 90,60 C 85,110 80,160 65,210" fill="none" stroke="url(#cyanGrad)" stroke-width="5" stroke-linecap="round"/>
    <!-- Right Leg -->
    <path d="M 210,65 C 215,110 220,165 240,210" fill="none" stroke="url(#violetGrad)" stroke-width="5" stroke-linecap="round"/>

    <!-- Node Circles (Connected Dots with visual glows) -->
    <!-- Top Bar Nodes -->
    <circle cx="50" cy="60" r="10" fill="#0a0a0f" stroke="#00f2fe" stroke-width="4.5" filter="url(#softGlow)" />
    <circle cx="150" cy="49" r="8" fill="#0a0a0f" stroke="#7f00ff" stroke-width="4" filter="url(#softGlow)" />
    <circle cx="250" cy="60" r="10" fill="#0a0a0f" stroke="#e100ff" stroke-width="4.5" filter="url(#softGlow)" />

    <!-- Left Leg Nodes -->
    <circle cx="85" cy="120" r="6" fill="#00f2fe" />
    <circle cx="65" cy="210" r="9" fill="#0a0a0f" stroke="#00f2fe" stroke-width="3" />

    <!-- Right Leg Nodes -->
    <circle cx="218" cy="130" r="6" fill="#7f00ff" />
    <circle cx="240" cy="210" r="9" fill="#0a0a0f" stroke="#e100ff" stroke-width="3" />

    <!-- Extra Dynamic Flow Signal Pulses -->
    <path d="M 50,60 C 80,52 110,49 130,49" fill="none" stroke="#fff" stroke-dasharray="10 120" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M 90,60 C 88,85 86,110 85,120" fill="none" stroke="#fff" stroke-dasharray="10 100" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    <path d="M 218,130 C 224,155 233,185 240,210" fill="none" stroke="#fff" stroke-dasharray="10 80" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Typography -->
  <g transform="translate(430, 130)">
    <text font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="34" fill="#ffffff" letter-spacing="1">
      Pi Dynamic
    </text>
    <text y="42" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="34" fill="url(#piGrad)" letter-spacing="1">
      Workflow
    </text>
    <text y="78" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="13" fill="#8e8ea8" letter-spacing="1.5">
      POCKETFLOW HARNESS
    </text>
    <!-- Horizontal Divider -->
    <line x1="0" y1="98" x2="280" y2="98" stroke="#222233" stroke-width="1.5" />
    <text y="118" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#5c5c70" letter-spacing="0.5">
      Automatic Telemetry • Blueprint Viz
    </text>
  </g>
</svg>
